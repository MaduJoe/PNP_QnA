version: '3.8'

services:
  # Main QnA Bot Service
  qna-bot:
    build: .
    container_name: qna-bot
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://redis:6379/0
      - MONGODB_URL=mongodb://mongodb:27017/qnabot
    depends_on:
      - redis
      - mongodb
    volumes:
      - ./logs:/app/logs
    networks:
      - qna-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: qna-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - qna-network

  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: qna-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password123
      - MONGO_INITDB_DATABASE=qnabot
    volumes:
      - mongodb-data:/data/db
    networks:
      - qna-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: qna-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - qna-bot
    networks:
      - qna-network

  # Data Sync Service (for Cafe crawling)
  data-sync:
    build:
      context: .
      dockerfile: Dockerfile.datasync
    container_name: qna-data-sync
    restart: unless-stopped
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/qnabot
      - SCHEDULE_INTERVAL=3600  # 1시간마다 실행
    depends_on:
      - mongodb
    volumes:
      - ./scripts:/app/scripts
    networks:
      - qna-network

volumes:
  redis-data:
  mongodb-data:

networks:
  qna-network:
    driver: bridge 